{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroke Prediction Visualization</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            text-align: center;
            padding: 30px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        img {
            border-radius: 10px;
            max-width: 100%;
            height: auto;
            margin-top: 20px;
        }
        .btn-predict {
            background-color: #dc3545;
            color: white;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 5px;
            text-transform: uppercase;
            text-decoration: none;
        }
        .btn-predict:hover {
            background-color: #c82333;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-primary">🧠 Stroke Prediction Visualization</h1>
    <hr>
    
    <h3>🩺 Prediction Result:</h3>
    <h4 class="text-success">{{ result }}</h4>
    
    <div class="mt-4">
        <h4>📊 Age vs Stroke Occurrence:</h4>
        <img src="{% static 'age.png' %}" alt="Age vs Stroke Occurrence">
    </div>

    <div class="mt-4">
        <h4>🧑‍🤝‍🧑 Gender-wise Stroke Distribution:</h4>
        <img src="{% static 'gender.png' %}" alt="Gender-wise Stroke Distribution">
    </div>

    <div class="mt-4">
        <h4>🚬 Smoking Status vs Stroke:</h4>
        <img src="{% static 'smoking.png' %}" alt="Smoking Status vs Stroke">
    </div>

    <div class="mt-4">
        <h4>⚖️ BMI Distribution:</h4>
        <img src="{% static 'bmi.png' %}" alt="BMI Distribution">
    </div>

    <a href="{% url 'home' %}" class="btn btn-primary mt-3">Go Back</a>
</div>

</body>
</html>
