{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stroke Prediction - Index</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    .hero-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.5); /* dark overlay */
      padding: 20px;
      z-index: 1;
    }
    .hero-container h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      color: #1cd4e9;
    }
    .hero-container p {
      font-size: 1.2rem;
      margin-bottom: 30px;
    }
    .btn-predict {
      background-color: #dc3545;
      color: white;
      padding: 15px 30px;
      font-size: 1.1rem;
      border-radius: 5px;
      text-transform: uppercase;
      text-decoration: none;
    }
    .btn-predict:hover {
      background-color: #c82333;
      text-decoration: none;
    }
    video#background-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
  </style>
</head>
<body>

  <video id="background-video" autoplay muted loop>
    <source src="{% static  'sample.mp4' %}" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <div class="hero-container">
    <h1>Welcome to Stroke Prediction</h1>
    <p>We provide insights to predict your stroke risk using various health metrics.</p>
  <div class="container my-4">
  <div class="row g-3 justify-content-center">
    <div class="col-auto">
      <a href="{% url 'upload' %}" class="btn btn-primary">Start Prediction</a>
    </div>
    <div class="col-auto">
      <a href="{% url 'analysis' %}" class="btn btn-outline-light">View Analysis</a>
    </div>
    <div class="col-auto">
      <a href="{% url 'causes' %}" class="btn btn-outline-info">Causes of Stroke</a>
    </div>
    <div class="col-auto">
      <a href="{% url 'booking' %}" class="btn btn-outline-info">Appointment</a>
    </div>
    <div class="col-auto">
      <a href="{% url 'list' %}" class="btn btn-outline-info">View Appointment</a>
    </div>
  </div>
</div>

  
</div>

  </div>

</body>
</html>
