<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stroke Prediction</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: url('https://images.unsplash.com/photo-1615461066841-643fa0d9ae8a?auto=format&fit=crop&w=1400&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background-color: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
            padding: 50px 20px;
        }

        .form-box {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            color: #c0392b;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #444;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #c0392b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #a93226;
        }

        .result {
            margin-top: 25px;
            text-align: center;
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            background-color: #fdecea;
            color: #a94442;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="form-box">
            <h2>🫀 Stroke Risk Prediction</h2>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Predict</button>
            </form>

            {% if result %}
                <div class="result">
                    <strong>Result:</strong> {{ result }}
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
